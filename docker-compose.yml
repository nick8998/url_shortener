services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # app:

volumes:
  pgdata:
  redisdata: